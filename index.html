<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Shivaani 🌸</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .landing-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px;
      position: relative;
      overflow: hidden;
    }
    .petals-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .petal {
      position: absolute;
      animation: fallDown linear infinite;
      opacity: 0.6;
    }
    @keyframes fallDown {
      0%   { transform: translateY(-60px) rotate(0deg); opacity: 0.6; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }
    .landing-content { position: relative; z-index: 1; }
    .land-eyebrow {
      font-family: var(--ff-body);
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--lavender-dk);
      margin-bottom: 14px;
    }
    .land-title {
      font-family: var(--ff-display);
      font-size: clamp(4rem, 12vw, 7rem);
      color: var(--lavender-dk);
      line-height: 1.05;
      margin-bottom: 10px;
    }
    .land-age {
      font-family: var(--ff-serif);
      font-style: italic;
      font-size: clamp(1.1rem, 3vw, 1.4rem);
      color: var(--ink-soft);
      margin-bottom: 52px;
    }
    .land-question {
      font-family: var(--ff-serif);
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      color: var(--ink);
      font-weight: 300;
      margin-bottom: 28px;
      transition: all 0.4s ease;
    }
    .btn-row {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }
    .btn-yes {
      background: var(--lavender);
      color: var(--ink);
      border: none;
      border-radius: 50px;
      padding: 16px 44px;
      font-family: var(--ff-body);
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
      box-shadow: 0 6px 24px rgba(159, 134, 204, 0.3);
    }
    .btn-yes:hover { background: var(--lavender-dk); color: white; transform: translateY(-3px); }
    .btn-no {
      background: transparent;
      color: var(--ink-soft);
      border: 1.5px solid var(--lavender);
      border-radius: 50px;
      padding: 16px 44px;
      font-family: var(--ff-body);
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    .btn-no:hover { transform: translateY(-3px); }
    .sad-msg {
      display: none;
      font-family: var(--ff-serif);
      font-style: italic;
      font-size: 1.1rem;
      color: var(--lavender-dk);
      max-width: 340px;
      line-height: 1.8;
      margin: 0 auto;
    }
    .sad-msg.show { display: block; }
    .going-msg {
      display: none;
      font-family: var(--ff-serif);
      font-style: italic;
      font-size: 1.2rem;
      color: var(--lavender-dk);
    }
    .going-msg.show { display: block; }
  </style>
</head>
<body>
  <div class="petals-bg" id="petals"></div>
  <div class="landing-wrap">
    <div class="landing-content">
      <p class="land-eyebrow fade-up">a little something from your lil sis 🌸</p>
      <h1 class="land-title fade-up delay-1">Happy Birthday<br>Love!</h1>
      <p class="land-age fade-up delay-2">you're finally 21 ✨</p>
      <p class="land-question fade-up delay-3" id="question">do you want to see your surprise? 🎁</p>
      <div class="btn-row fade-up delay-3" id="btns">
        <button class="btn-yes" onclick="sayYes()">yes, obviously!! 💌</button>
        <button class="btn-no" onclick="sayNo()">no 🙈</button>
      </div>
      <p class="sad-msg" id="sadmsg">
        oh... okay then 🥺<br><br>
        just kidding — i know you want to.<br>
        go on, press yes. i made this just for you 🌸
      </p>
      <p class="going-msg" id="goingmsg">yay!! taking you to your surprise... 🌸</p>
    </div>
  </div>
  <script>
    const container = document.getElementById('petals');
    const emojis = ['🌸', '✨', '🌷', '💜', '🌟', '🎀'];
    for (let i = 0; i < 22; i++) {
      const p = document.createElement('span');
      p.className = 'petal';
      p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      p.style.left = Math.random() * 100 + '%';
      p.style.fontSize = (0.8 + Math.random() * 1) + 'rem';
      p.style.animationDuration = (5 + Math.random() * 7) + 's';
      p.style.animationDelay = (Math.random() * 8) + 's';
      container.appendChild(p);
    }
    function sayNo() {
      document.getElementById('sadmsg').classList.add('show');
      document.getElementById('question').textContent = 'really?? 🥺';
    }
    function sayYes() {
      document.getElementById('btns').style.display = 'none';
      document.getElementById('sadmsg').classList.remove('show');
      document.getElementById('question').textContent = 'yay!! 🎉';
      document.getElementById('goingmsg').classList.add('show');
      setTimeout(() => { window.location.href = 'cards.html'; }, 1800);
    }
  </script>
</body>
</html>
